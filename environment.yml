name: sop
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.1
  - pytorch-cuda=12.1      # remove or change if CPU-only
  - cpuonly                # uncomment this AND remove pytorch-cuda for CPU
  - h5py>=3.9
  - numpy>=1.26
  - scikit-learn>=1.4
  - scipy>=1.12
  - pyyaml>=6.0
  - matplotlib>=3.8
  - seaborn>=0.13
  - pytest>=8.0
  - pytest-cov
  - pip
  - pip:
    - umap-learn
    - transformers>=4.38
    - sentencepiece
    - -e .

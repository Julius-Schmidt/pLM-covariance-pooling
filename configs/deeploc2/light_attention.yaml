# Light Attention pooling (Stärk et al. 2021) on DeepLoc 2.
# No dc (first-order pool). Output dim = 2·d.
task: multilabel_classification

data:
  train_embeddings: data/embeddings/deeploc2_train.h5
  test_embeddings:  data/embeddings/deeploc2_test.h5
  train_labels:     data/raw/deeploc2/train_labels.csv
  id_col:           ACC
  meta_cols:        ["Unnamed: 0", Kingdom, Partition, Sequence]
  test_labels:      data/raw/deeploc2/test_labels.csv

pooling:
  method: light_attention
  d: 1024
  kernel_size: 9
  conv_dropout: 0.25

probe:
  hidden_dim: 256
  dropout: 0.1
  batch_size: 64
  epochs: 50
  patience: 8
  lr: 1.0e-3
  weight_decay: 0.0

seeds: [0, 1, 2]

# Mean-pooling baseline on DeepLoc 2 (multi-class subcellular localisation).
task: classification

data:
  train_embeddings: data/embeddings/deeploc2_train.h5
  test_embeddings:  data/embeddings/deeploc2_test.h5
  train_labels:     data/raw/deeploc2/train_labels.csv   # columns: id, label
  test_labels:      data/raw/deeploc2/test_labels.csv

pooling:
  method: mean
  d: 1024                # ProtT5 hidden dimension

probe:
  hidden_dim: 256
  dropout: 0.1
  batch_size: 64
  epochs: 50
  patience: 8
  lr: 1.0e-3
  weight_decay: 0.0

seeds: [0, 1, 2]

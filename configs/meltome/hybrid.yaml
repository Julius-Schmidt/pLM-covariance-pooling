# Hybrid pooling [μ ; flat(C)] on Meltome thermostability.
task: regression

data:
  train_embeddings: data/embeddings/meltome_train.h5
  test_embeddings:  data/embeddings/meltome_test.h5
  train_labels:     data/raw/meltome/train_labels.csv
  test_labels:      data/raw/meltome/test_labels.csv

pooling:
  method: hybrid
  d: 1024
  dc: 32
  # pretrained_path: models/unsup_pooler_dc32.pt   # uncomment to freeze cov branch

probe:
  hidden_dim: 256
  dropout: 0.1
  batch_size: 64
  epochs: 30
  lr: 1.0e-3
  weight_decay: 0.0

seeds: [0, 1, 2]

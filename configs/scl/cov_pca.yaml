# Closed-form (PCA) covariance pooling on subcellular localisation.
# Algorithmic alternative to the autoencoder — no SGD, no hyperparameters.
# Requires a checkpoint produced by:
#   python scripts/fit_pca_pool.py \
#       --embeddings data/embeddings/deeploc_train.h5 --d 1024 --dc 32 \
#       --output models/pca_pooler_dc32.pt
task: classification

data:
  train_embeddings: data/embeddings/deeploc_train.h5
  test_embeddings:  data/embeddings/deeploc_test.h5
  train_labels:     data/raw/deeploc/train_labels.csv
  test_labels:      data/raw/deeploc/test_labels.csv

pooling:
  method: cov_pca
  d: 1024
  dc: 32
  pretrained_path: models/pca_pooler_dc32.pt

probe:
  hidden_dim: 256
  dropout: 0.1
  batch_size: 16
  epochs: 30
  lr: 1.0e-3
  weight_decay: 0.0

seeds: [0, 1, 2]

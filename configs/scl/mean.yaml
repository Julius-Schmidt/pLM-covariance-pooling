# Mean-pooling baseline on subcellular localisation (10-class, residues_to_class).
task: classification

data:
  train_embeddings: data/embeddings/deeploc_train.h5
  test_embeddings:  data/embeddings/deeploc_test.h5
  train_labels:     data/raw/deeploc/train_labels.csv   # columns: id, label
  test_labels:      data/raw/deeploc/test_labels.csv

pooling:
  method: mean
  d: 1024                # ProtX hidden dimension

probe:
  hidden_dim: 256
  dropout: 0.1
  batch_size: 16
  epochs: 30
  lr: 1.0e-3
  weight_decay: 0.0

seeds: [0, 1, 2]
